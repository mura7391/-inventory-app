<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="棚卸">
<meta name="theme-color" content="#0f1117">
<meta name="mobile-web-app-capable" content="yes">
<title>棚卸アプリ</title>
<link id="pwa-manifest" rel="manifest">
<link rel="apple-touch-icon" id="apple-icon">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --accent: #4ade80;
    --accent-dim: rgba(74,222,128,0.12);
    --warn: #fb923c;
    --warn-dim: rgba(251,146,60,0.12);
    --danger: #f87171;
    --danger-dim: rgba(248,113,113,0.12);
    --info: #60a5fa;
    --info-dim: rgba(96,165,250,0.12);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #555a72;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 80px;
    overscroll-behavior-y: contain;
  }

  /* ===== PWA INSTALL BANNER ===== */
  .install-banner {
    display: none;
    background: var(--accent-dim);
    border-bottom: 1px solid rgba(74,222,128,0.2);
    padding: 10px 16px;
    align-items: center;
    gap: 10px;
  }
  .install-banner.show { display: flex; }
  .install-banner-text { flex: 1; font-size: 12px; color: #86efac; line-height: 1.5; }
  .install-banner-btn {
    background: var(--accent); color: #0f1117;
    border: none; border-radius: var(--radius-sm);
    padding: 7px 14px; font-weight: 700; font-size: 12px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
  .install-banner-close {
    color: var(--text3); background: none; border: none;
    font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0;
  }

  /* ===== OFFLINE BADGE ===== */
  .offline-badge {
    display: none;
    background: var(--warn-dim);
    border-bottom: 1px solid rgba(251,146,60,0.2);
    padding: 6px 16px;
    font-size: 11px; color: var(--warn);
    text-align: center;
  }
  .offline-badge.show { display: block; }

  /* ===== HEADER ===== */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .session-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text2);
    background: var(--surface2);
    padding: 3px 8px; border-radius: 20px;
  }
  .online-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 4px rgba(74,222,128,0.5);
    transition: background 0.3s;
  }
  .online-dot.offline { background: var(--warn); box-shadow: 0 0 4px rgba(251,146,60,0.5); }

  .progress-wrap { margin-bottom: 2px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%; background: var(--accent); border-radius: 3px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 8px rgba(74,222,128,0.4);
  }

  /* ===== SCAN ===== */
  .scan-section { padding: 16px; }
  .scan-input-wrap {
    display: flex; gap: 8px; align-items: center;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .scan-input-wrap:focus-within { border-color: var(--accent); }
  .scan-icon { color: var(--text3); font-size: 18px; flex-shrink: 0; }
  #barcodeInput {
    flex: 1; background: none; border: none; outline: none;
    font-family: 'DM Mono', monospace; font-size: 15px; color: var(--text);
    caret-color: var(--accent);
  }
  #barcodeInput::placeholder { color: var(--text3); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; }
  .scan-btn {
    background: var(--accent); color: #0f1117;
    border: none; border-radius: var(--radius-sm);
    padding: 8px 14px; font-weight: 700; font-size: 13px;
    cursor: pointer; flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  .scan-btn:active { opacity: 0.8; transform: scale(0.97); }

  /* ===== RESULT CARD ===== */
  .result-card {
    margin-top: 12px; background: var(--surface);
    border: 1.5px solid var(--border); border-radius: var(--radius);
    overflow: hidden; animation: slideIn 0.25s ease; display: none;
  }
  .result-card.show { display: block; }
  @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  .result-header { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); }
  .result-product-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .result-barcode { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }
  .result-body { padding: 14px 16px; }

  .stock-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .stock-chip { flex: 1; background: var(--surface2); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; }
  .stock-chip-label { font-size: 10px; color: var(--text3); margin-bottom: 2px; }
  .stock-chip-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
  .stock-chip-val.accent { color: var(--accent); }

  .input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .input-row label { font-size: 12px; color: var(--text2); white-space: nowrap; }
  .qty-input {
    flex: 1; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500;
    text-align: center; padding: 8px; outline: none; transition: border-color 0.2s;
  }
  .qty-input:focus { border-color: var(--accent); }
  .qty-btn {
    width: 44px; height: 44px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 22px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s; flex-shrink: 0;
  }
  .qty-btn:active { background: var(--surface); }

  .diff-alert { border-radius: var(--radius-sm); padding: 10px 12px; font-size: 12px; line-height: 1.6; margin-bottom: 12px; display: none; }
  .diff-alert.show { display: block; }
  .diff-alert.ok     { background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.3); color: #86efac; }
  .diff-alert.warn   { background: var(--warn-dim);   border: 1px solid rgba(251,146,60,0.3);  color: #fdba74; }
  .diff-alert.danger { background: var(--danger-dim); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
  .diff-alert-title { font-weight: 700; font-size: 13px; margin-bottom: 2px; }

  .add-mode-notice {
    background: var(--info-dim); border: 1px solid rgba(96,165,250,0.3);
    border-radius: var(--radius-sm); padding: 8px 12px;
    font-size: 12px; color: var(--info); margin-bottom: 12px; display: none;
  }
  .add-mode-notice.show { display: flex; gap: 8px; align-items: center; }

  .save-btn {
    width: 100%; padding: 12px; background: var(--accent); color: #0f1117;
    border: none; border-radius: var(--radius-sm); font-weight: 700; font-size: 15px;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .save-btn:active { opacity: 0.85; transform: scale(0.98); }

  /* ===== LIST ===== */
  .section-header { padding: 16px 16px 8px; display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .tab-row { display: flex; gap: 6px; padding: 0 16px 10px; overflow-x: auto; scrollbar-width: none; }
  .tab-row::-webkit-scrollbar { display: none; }
  .tab {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer;
    background: var(--surface); border: 1px solid var(--border); color: var(--text2); transition: all 0.15s; white-space: nowrap;
  }
  .tab.active { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.15); }
  .item-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .item-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s;
    cursor: pointer; user-select: none;
  }
  .item-card:active { background: var(--surface2); }
  .item-card.done    { border-left: 3px solid var(--accent); }
  .item-card.warn    { border-left: 3px solid var(--warn); }
  .item-card.danger  { border-left: 3px solid var(--danger); }
  .item-card.pending { opacity: 0.6; }
  .item-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .item-icon.done    { background: var(--accent-dim); }
  .item-icon.warn    { background: var(--warn-dim); }
  .item-icon.danger  { background: var(--danger-dim); }
  .item-icon.pending { background: var(--surface2); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sub  { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .item-counts { text-align: right; flex-shrink: 0; }
  .item-count-now  { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; }
  .item-count-prev { font-size: 11px; color: var(--text3); margin-top: 1px; font-family: 'DM Mono', monospace; }
  .item-diff { font-size: 11px; font-weight: 700; margin-top: 2px; font-family: 'DM Mono', monospace; }
  .item-diff.plus  { color: var(--warn); }
  .item-diff.minus { color: var(--danger); }
  .item-diff.zero  { color: var(--accent); }

  /* ===== MODAL ===== */
  .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: flex-end; }
  .modal-overlay.hidden { display: none; }
  .modal-sheet {
    width: 100%; max-width: 480px; margin: 0 auto;
    background: var(--surface); border-radius: 20px 20px 0 0;
    padding: 20px 16px; padding-bottom: max(40px, env(safe-area-inset-bottom));
    animation: sheetUp 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 14px; line-height: 1.6; }
  .modal-textarea {
    width: 100%; height: 160px; background: var(--surface2); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Mono', monospace;
    font-size: 12px; padding: 10px 12px; resize: none; outline: none; transition: border-color 0.2s;
  }
  .modal-textarea:focus { border-color: var(--accent); }
  .modal-textarea::placeholder { color: var(--text3); }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-weight: 700; font-size: 14px; cursor: pointer; border: none; transition: opacity 0.15s; }
  .modal-btn.primary   { background: var(--accent); color: #0f1117; }
  .modal-btn.secondary { background: var(--surface2); color: var(--text); }
  .modal-btn:active { opacity: 0.8; }

  /* ===== TOOLBAR ===== */
  .toolbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(15,17,23,0.97); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom));
    display: flex; gap: 6px; z-index: 100;
  }
  .toolbar-btn {
    flex: 1; padding: 9px 4px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: var(--surface); color: var(--text2); font-size: 11px; font-weight: 500;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; transition: all 0.15s;
  }
  .toolbar-btn:active { background: var(--surface2); }
  .toolbar-btn.primary { background: var(--accent-dim); color: var(--accent); border-color: rgba(74,222,128,0.25); }

  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 24px; padding: 10px 20px; font-size: 13px; font-weight: 500;
    z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; line-height: 2; }
</style>
</head>
<body>

<!-- ===== PWA INSTALL BANNER ===== -->
<div class="install-banner" id="installBanner">
  <div class="install-banner-text">📱 ホーム画面に追加してオフラインでも使えます</div>
  <button class="install-banner-btn" onclick="installPWA()">追加する</button>
  <button class="install-banner-close" onclick="dismissInstall()">✕</button>
</div>

<!-- ===== OFFLINE BADGE ===== -->
<div class="offline-badge" id="offlineBadge">📡 オフラインモード — データはローカルに保存されます</div>

<!-- ===== HEADER ===== -->
<div class="header">
  <div class="header-top">
    <span class="app-title">📦 棚卸アプリ</span>
    <div class="header-right">
      <div class="online-dot" id="onlineDot"></div>
      <span class="session-badge" id="sessionDate"></span>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>進捗（前日在庫1以上）</span>
      <span id="progressText">0 / 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- ===== SCAN ===== -->
<div class="scan-section">
  <div class="scan-input-wrap">
    <span class="scan-icon">▦</span>
    <input type="text" id="barcodeInput" placeholder="バーコードを入力 / スキャン" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="scan-btn" onclick="handleScan()">読取</button>
  </div>
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-product-name" id="resultName">—</div>
      <div class="result-barcode" id="resultBarcode">—</div>
    </div>
    <div class="result-body">
      <div class="stock-row">
        <div class="stock-chip"><div class="stock-chip-label">前日在庫</div><div class="stock-chip-val" id="prevStockVal">—</div></div>
        <div class="stock-chip"><div class="stock-chip-label">今回カウント</div><div class="stock-chip-val accent" id="currentStockVal">—</div></div>
        <div class="stock-chip"><div class="stock-chip-label">差異</div><div class="stock-chip-val" id="diffVal">—</div></div>
      </div>
      <div class="add-mode-notice" id="addModeNotice">
        <span>＋</span>
        <span>二重スキャン検出 — 既存 <strong id="existingCount">0</strong> に追加入力</span>
      </div>
      <div class="input-row">
        <label>個数</label>
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input type="number" class="qty-input" id="qtyInput" value="0" min="0" inputmode="numeric" oninput="onQtyChange()"/>
        <button class="qty-btn" onclick="changeQty(1)">＋</button>
      </div>
      <div class="diff-alert" id="diffAlert">
        <div class="diff-alert-title" id="diffAlertTitle"></div>
        <div id="diffAlertBody"></div>
      </div>
      <button class="save-btn" onclick="saveItem()">この数量で確定 ✓</button>
    </div>
  </div>
</div>

<!-- ===== LIST ===== -->
<div class="section-header">
  <span class="section-title">商品一覧</span>
  <span style="font-size:11px;color:var(--text3)" id="listSummary"></span>
</div>
<div class="tab-row">
  <div class="tab active" onclick="setTab('all',this)">すべて</div>
  <div class="tab" onclick="setTab('done',this)">完了</div>
  <div class="tab" onclick="setTab('warn',this)">⚠ 差異あり</div>
  <div class="tab" onclick="setTab('pending',this)">未完了</div>
</div>
<div class="item-list" id="itemList"></div>

<!-- ===== IMPORT MODAL ===== -->
<div class="modal-overlay hidden" id="importModal" onclick="closeImportModal(event)">
  <div class="modal-sheet">
    <div class="modal-title">前日在庫データ読み込み</div>
    <div class="modal-sub">スプレッドシートの列をコピーして貼り付けてください。<br>形式：<code style="color:var(--accent)">バーコード,商品名,前日在庫数</code>（1行1商品）</div>
    <textarea class="modal-textarea" id="importText" placeholder="例：&#10;4912345678901,コーラ 500ml,24&#10;4912345678902,お茶 350ml,36&#10;4912345678903,ミネラルウォーター,0"></textarea>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeImportModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="importData()">読み込む</button>
    </div>
  </div>
</div>

<!-- ===== TOOLBAR ===== -->
<div class="toolbar">
  <button class="toolbar-btn" onclick="openImportModal()">📋 在庫取込</button>
  <button class="toolbar-btn" onclick="loadDemo()">🔄 デモ</button>
  <button class="toolbar-btn primary" onclick="exportResult()">📤 出力</button>
</div>

<div class="toast" id="toast"></div>

// ===== SERVICE WORKER (inline via blob) =====
const SW_CODE = `
const CACHE = 'tanaboroshi-v1';
const ASSETS = [self.location.href.replace('/sw.js','/')];

self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(clients.claim());
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }).catch(() => caches.match(e.request)))
  );
});
`;

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([SW_CODE], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl, { scope: './' })
    .then(reg => console.log('SW registered', reg.scope))
    .catch(e => console.warn('SW registration failed (expected in file://):', e));
}

// ===== PERSIST STATE (IndexedDB) =====
let db;
const DB_NAME = 'tanaboroshi', DB_VER = 1;

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('state')) d.createObjectStore('state');
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = () => rej(req.error);
  });
}
async function saveState() {
  if (!db) return;
  const tx = db.transaction('state', 'readwrite');
  const s = tx.objectStore('state');
  s.put(JSON.stringify(masterData), 'masterData');
  s.put(JSON.stringify(counted), 'counted');
}
async function loadState() {
  if (!db) return;
  const tx = db.transaction('state', 'readonly');
  const s = tx.objectStore('state');
  const [md, ct] = await Promise.all([
    new Promise(r => { const q = s.get('masterData'); q.onsuccess = () => r(q.result); }),
    new Promise(r => { const q = s.get('counted');    q.onsuccess = () => r(q.result); }),
  ]);
  if (md) masterData = JSON.parse(md);
  if (ct) counted    = JSON.parse(ct);
}

// ===== SCAN =====
function handleScan() {
  const raw = document.getElementById('barcodeInput').value.trim();
  if (!raw) return;
  const item = masterData.find(d => d.barcode === raw);
  if (!item) { showToast('⚠ この商品は登録されていません'); showResultCard(null, raw); return; }
  showResultCard(item, raw);
  document.getElementById('barcodeInput').value = '';
  document.getElementById('barcodeInput').focus();
}

function showResultCard(item, barcode) {
  currentBarcode = barcode;
  const card = document.getElementById('resultCard');
  card.classList.add('show');

  if (!item) {
    document.getElementById('resultName').textContent = '未登録商品';
    document.getElementById('resultBarcode').textContent = barcode;
    document.getElementById('prevStockVal').textContent = '—';
    document.getElementById('currentStockVal').textContent = '—';
    document.getElementById('diffVal').textContent = '—';
    document.getElementById('qtyInput').value = 0;
    document.getElementById('addModeNotice').classList.remove('show');
    document.getElementById('diffAlert').classList.remove('show');
    return;
  }

  document.getElementById('resultName').textContent = item.name;
  document.getElementById('resultBarcode').textContent = item.barcode;
  document.getElementById('prevStockVal').textContent = item.prevStock;

  const existing = counted[barcode];
  const addMode = !!existing;
  if (addMode) {
    document.getElementById('addModeNotice').classList.add('show');
    document.getElementById('existingCount').textContent = existing.qty;
    document.getElementById('qtyInput').value = 0;
  } else {
    document.getElementById('addModeNotice').classList.remove('show');
    document.getElementById('qtyInput').value = 0;
  }
  updateDiffDisplay(item, addMode ? existing.qty : 0, 0);
  setTimeout(() => { document.getElementById('qtyInput').focus(); document.getElementById('qtyInput').select(); }, 100);
}

function changeQty(delta) {
  const el = document.getElementById('qtyInput');
  el.value = Math.max(0, (parseInt(el.value)||0) + delta);
  onQtyChange();
}
function onQtyChange() {
  if (!currentBarcode) return;
  const item = masterData.find(d => d.barcode === currentBarcode);
  if (!item) return;
  const base = counted[currentBarcode]?.qty ?? 0;
  updateDiffDisplay(item, base, parseInt(document.getElementById('qtyInput').value)||0);
}
function updateDiffDisplay(item, base, adding) {
  const total = base + adding;
  const diff = total - item.prevStock;
  document.getElementById('currentStockVal').textContent = total;
  const diffEl = document.getElementById('diffVal');
  if (diff > 0)      { diffEl.textContent=`+${diff}`; diffEl.style.color='var(--warn)'; }
  else if (diff < 0) { diffEl.textContent=`${diff}`;  diffEl.style.color='var(--danger)'; }
  else               { diffEl.textContent='±0';        diffEl.style.color='var(--accent)'; }

  const alert = document.getElementById('diffAlert');
  alert.className = 'diff-alert';
  if (diff === 0) {
    alert.classList.add('show','ok');
    document.getElementById('diffAlertTitle').textContent = '✓ 帳簿と一致';
    document.getElementById('diffAlertBody').textContent = `前日在庫 ${item.prevStock} と今回カウント ${total} が一致しています。`;
  } else if (Math.abs(diff) <= 2) {
    alert.classList.add('show','warn');
    document.getElementById('diffAlertTitle').textContent = `⚠ 差異あり（${diff>0?'+':''}${diff}）`;
    document.getElementById('diffAlertBody').textContent = `前日在庫は ${item.prevStock} ですが、今回カウントは ${total} です。数え直してみてください。`;
  } else {
    alert.classList.add('show','danger');
    document.getElementById('diffAlertTitle').textContent = `🚨 大きな差異（${diff>0?'+':''}${diff}）`;
    document.getElementById('diffAlertBody').textContent = `前日在庫 ${item.prevStock} に対し ${total} — 差が ${Math.abs(diff)} あります。紛失・誤出荷の可能性を確認してください。`;
  }
  alert.classList.add('show');
}

async function saveItem() {
  if (!currentBarcode) return;
  const item = masterData.find(d => d.barcode === currentBarcode);
  const adding = parseInt(document.getElementById('qtyInput').value)||0;
  const base = counted[currentBarcode]?.qty ?? 0;
  counted[currentBarcode] = { qty: base + adding, savedAt: new Date().toISOString() };
  await saveState();
  showToast(`✓ ${item ? item.name : '未登録'} — ${base+adding}個 確定`);
  document.getElementById('resultCard').classList.remove('show');
  currentBarcode = null;
  renderList();
  updateProgress();
}

function updateProgress() {
  const targets = masterData.filter(d => d.prevStock >= 1);
  const done = targets.filter(d => counted[d.barcode] !== undefined).length;
  const pct = targets.length === 0 ? 0 : Math.round(done/targets.length*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${targets.length}`;
  document.getElementById('listSummary').textContent = `${masterData.length}品 登録`;
}

function renderList() {
  const list = document.getElementById('itemList');
  let items = masterData;
  if (currentTab==='done')    items = masterData.filter(d => counted[d.barcode]);
  if (currentTab==='pending') items = masterData.filter(d => !counted[d.barcode] && d.prevStock>=1);
  if (currentTab==='warn')    items = masterData.filter(d => counted[d.barcode] && counted[d.barcode].qty !== d.prevStock);
  if (!items.length) { list.innerHTML=`<div class="empty-state">該当する商品がありません</div>`; return; }
  const icons = { done:'✓', warn:'⚠', danger:'🚨', pending:'○' };
  list.innerHTML = items.map(d => {
    const c = counted[d.barcode];
    const diff = c ? c.qty - d.prevStock : null;
    const status = c ? (diff===0?'done':Math.abs(diff)<=2?'warn':'danger') : 'pending';
    const diffHtml = diff!==null ? (diff>0?`<span class="item-diff plus">+${diff}</span>`:diff<0?`<span class="item-diff minus">${diff}</span>`:`<span class="item-diff zero">±0</span>`) : '';
    return `<div class="item-card ${status}" onclick="quickScan('${d.barcode}')">
      <div class="item-icon ${status}">${icons[status]}</div>
      <div class="item-info"><div class="item-name">${d.name}</div><div class="item-sub">${d.barcode}</div></div>
      <div class="item-counts">
        <div class="item-count-now">${c?c.qty:'—'}</div>
        <div class="item-count-prev">前日: ${d.prevStock}</div>
        ${diffHtml}
      </div></div>`;
  }).join('');
}

function quickScan(barcode) {
  document.getElementById('barcodeInput').value = barcode;
  handleScan();
  window.scrollTo({ top:0, behavior:'smooth' });
}
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function openImportModal() { document.getElementById('importModal').classList.remove('hidden'); }
function closeImportModal(e) { if (!e || e.target===document.getElementById('importModal')) document.getElementById('importModal').classList.add('hidden'); }

async function importData() {
  const raw = document.getElementById('importText').value.trim();
  const result = raw.split('\n').filter(l=>l.trim()).map(line => {
    const p = line.split(',').map(s=>s.trim());
    return p.length>=3 && p[0] && p[1] ? { barcode:p[0], name:p[1], prevStock:parseInt(p[2])||0 } : null;
  }).filter(Boolean);
  if (!result.length) { showToast('⚠ データを読み取れませんでした'); return; }
  masterData = result; counted = {};
  await saveState();
  closeImportModal(); renderList(); updateProgress();
  showToast(`✓ ${result.length}商品 読み込み完了`);
}

async function loadDemo() {
  masterData = DEMO.map(d=>({...d})); counted = {};
  await saveState();
  renderList(); updateProgress();
  showToast('🔄 デモデータを読み込みました');
}

function exportResult() {
  if (!masterData.length) { showToast('⚠ データがありません'); return; }
  const rows = ['バーコード,商品名,前日在庫,今回カウント,差異'];
  masterData.forEach(d => {
    const c = counted[d.barcode];
    rows.push(`${d.barcode},${d.name},${d.prevStock},${c?c.qty:''},${c?c.qty-d.prevStock:''}`);
  });
  const blob = new Blob(['\uFEFF'+rows.join('\n')], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `棚卸結果_${new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')}.csv`;
  a.click();
  showToast('📤 CSVを出力しました');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
